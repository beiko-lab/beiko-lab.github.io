<style>
:root {
  --brand-blue: rgb(16,158,240);
}

/* =========================================================
   🖥 DESKTOP (YOUR ORIGINAL DESIGN — KEEP IT)
========================================================= */

.navbar .container-fluid {
  display: flex;
  align-items: center;
}

.navbar-header {
  display: flex;
  align-items: center;
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.05;
}

.brand-text span {
  margin: 0;
}

.navbar-collapse {
  margin-left: auto !important;
}

.navbar-nav {
  float: none !important;
}

/* =========================
   ACTIVE LINKS
   ========================= */
.navbar-nav > li.active > a,
.navbar-nav > li.active > a:focus,
.navbar-nav > li.active > a:hover {
  color: var(--brand-blue) !important;
  font-weight: 600 !important;
  border-bottom: 2px solid var(--brand-blue);
  background: transparent !important;
}

.navbar-nav > li > a:hover {
  color: var(--brand-blue) !important;
}

/* dropdown hover */
.navbar-nav .dropdown:hover .dropdown-menu {
  display: block;
  margin-top: 0;
}

.dropdown-menu {
  border-radius: 6px;
}

/* =========================================================
   📱 MOBILE FIX (CRITICAL)
========================================================= */

@media (max-width: 768px) {

  /* STOP FLEX BREAKING BOOTSTRAP */
  .navbar .container-fluid {
    display: block !important;
  }

  /* HEADER MUST NOT BE FLEX ON MOBILE */
  .navbar-header {
    display: block !important;
    position: relative;
  }

  /* ☰ HAMBURGER TOP RIGHT */
  .navbar-toggle {
    position: absolute;
    right: 10px;
    top: 8px;
    margin: 0;
  }

  /* COLLAPSE MENU FIX */
  .navbar-collapse {
    margin-left: 0 !important;
    width: 100%;
    background: #fff;
  }

  /* BRAND STABILITY */
  .navbar-brand {
    display: inline-flex;
    align-items: center;
  }
}
</style>

<!-- =========================================================
     NAVBAR STRUCTURE (UNCHANGED CONTENT)
========================================================= -->
<div class="navbar navbar-default navbar-fixed-top" role="navigation">
  <div class="container-fluid">

    <!-- HEADER -->
    <div class="navbar-header">

      <!-- HAMBURGER -->
      <button type="button"
              class="navbar-toggle collapsed"
              data-toggle="collapse"
              data-target="#navbar-collapse-1"
              aria-expanded="false">

        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>

      </button>

      <!-- BRAND (UNCHANGED) -->
      <a class="navbar-brand" href="{{ site.url }}{{ site.baseurl }}/">

        <div class="brand-text">
          <span style="color:black; font-size:14px; font-weight:bold;">
            Welcome to
          </span>

          <span style="color:var(--brand-blue); font-weight:600; font-size:16px;">
            Beiko Lab
          </span>
        </div>

        <img src="{{ '/images/logo/dalhousie-logo-black.svg' | relative_url }}"
             alt="Dalhousie University"
             style="height:40px; width:auto;">

      </a>

    </div>

    <!-- MENU -->
    <div class="collapse navbar-collapse" id="navbar-collapse-1">

      <ul class="nav navbar-nav navbar-right">

        <li class="{% if page.url == '/' %}active{% endif %}">
          <a href="{{ site.url }}{{ site.baseurl }}/">Home</a>
        </li>

        <li class="{% if page.url contains 'team' %}active{% endif %}">
          <a href="{{ site.url }}{{ site.baseurl }}/team">Team</a>
        </li>

        <li class="{% if page.url contains 'research' %}active{% endif %}">
          <a href="{{ site.url }}{{ site.baseurl }}/research">Research</a>
        </li>

        <li class="{% if page.url contains 'software' %}active{% endif %}">
          <a href="{{ site.url }}{{ site.baseurl }}/software">Software</a>
        </li>

        <li class="{% if page.url contains 'publications' %}active{% endif %}">
          <a href="{{ site.url }}{{ site.baseurl }}/publications">Publications</a>
        </li>

        <li class="{% if page.url contains 'news' %}active{% endif %}">
          <a href="{{ site.url }}{{ site.baseurl }}/news">News</a>
        </li>

        <li class="dropdown">
          <a href="#" class="dropdown-toggle" data-toggle="dropdown">
            More <span class="caret"></span>
          </a>

          <ul class="dropdown-menu">
            <li><a href="{{ site.url }}{{ site.baseurl }}/gallery">Gallery</a></li>
            <li><a href="{{ site.url }}{{ site.baseurl }}/opportunities">Opportunities</a></li>
          </ul>
        </li>

      </ul>

    </div>

  </div>
</div>
