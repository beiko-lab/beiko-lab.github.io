---
layout: default
---

<style>
/* =========================
   HERO IMAGE
   ========================= */
.lab-image img {
  width: 100%;
  height: 60vh;
  object-fit: cover;
  display: block;
}

/* =========================
   FIX 1: NAVBAR SHIFT BUG
   ========================= */
/* IMPORTANT: DO NOT globally zero out Bootstrap padding */
.container-fluid {
  /* only apply inside your sections if needed */
}

/* =========================
   FIX 2: ALIGN CONTENT WITH IMAGE
   ========================= */
.content-wrapper {
  width: 100%;
  padding: 40px 0;   /* 👈 FIXED (removes left/right mismatch) */
}

/* keep readable spacing INSIDE content only */
.content-wrapper > * {
  padding-left: 6%;
  padding-right: 6%;
}

/* =========================
   CAROUSEL
   ========================= */
.carousel-inner .item img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

/* =========================
   BODY RESET
   ========================= */
body {
  margin: 0;
}
</style>

<!-- =========================
     HERO IMAGE
========================= -->
<div class="lab-image">
  <img src="{{ '/images/gallery/beiko_lab_photo.jpg' | relative_url }}" alt="Beiko Lab Photo">
</div>

<!-- =========================
     CONTENT (ALIGNED WITH IMAGE)
========================= -->
<div class="container-fluid">
  <div class="content-wrapper">
    {{ content }}
  </div>
</div>

<!-- =========================
     CAROUSEL
========================= -->
<div class="container-fluid">
  <div id="carousel" class="carousel slide" data-ride="carousel" data-interval="5000">

    <ol class="carousel-indicators">
      {% for file in site.data.slider %}
      <li data-target="#carousel" data-slide-to="{{ forloop.index0 }}"
          class="{% if forloop.first %}active{% endif %}">
      </li>
      {% endfor %}
    </ol>

    <div class="carousel-inner">
      {% for file in site.data.slider %}
      <div class="item {% if forloop.first %}active{% endif %}">
        <img src="{{ '/images/slider/' | append: file | relative_url }}" alt="Slide {{ forloop.index }}">
      </div>
      {% endfor %}
    </div>

    <a class="left carousel-control" href="#carousel" data-slide="prev">
      <span class="glyphicon glyphicon-chevron-left"></span>
    </a>

    <a class="right carousel-control" href="#carousel" data-slide="next">
      <span class="glyphicon glyphicon-chevron-right"></span>
    </a>

  </div>
</div>
