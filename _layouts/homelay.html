---
layout: default
---

<style>

/* =========================
   HERO IMAGE
   ========================= */
.lab-image img {
  width: 100%;
  height: 60vh;
  object-fit: cover;
  display: block;
}

/* 📱 MOBILE FIX → show full image */
@media (max-width: 768px) {
  .lab-image img {
    height: auto !important;
    max-height: none;
    object-fit: contain !important;
  }
}

/* =========================
   CONTENT ALIGNMENT (UNCHANGED FIX)
   ========================= */
.container-fluid {
  padding-left: 0 !important;
  padding-right: 0 !important;
}

.content-wrapper {
  width: 100%;
  padding: 40px 0;
}

.content-wrapper h1,
.content-wrapper h2,
.content-wrapper h3,
.content-wrapper p,
.content-wrapper li {
  padding-left: 6%;
  padding-right: 6%;
}

/* =========================
   CAROUSEL
   ========================= */
.carousel-inner .item img {
  width: 100%;
  height: 400px;
  object-fit: cover;
  display: block;
}

/* 📱 MOBILE CAROUSEL FIX */
@media (max-width: 768px) {
  .carousel-inner .item img {
    height: auto !important;
    object-fit: contain !important;
    max-height: none;
  }
}

/* =========================
   BODY RESET
   ========================= */
body {
  margin: 0;
}

</style>

<!-- =========================
     HERO IMAGE
========================= -->
<div class="lab-image">
  <img src="{{ '/images/gallery/beiko_lab_photo.jpg' | relative_url }}" alt="Beiko Lab Photo">
</div>

<!-- =========================
     CONTENT
========================= -->
<div class="container-fluid">
  <div class="content-wrapper">
    {{ content }}
  </div>
</div>

<!-- =========================
     CAROUSEL
========================= -->
<div class="container-fluid">
  <div id="carousel" class="carousel slide" data-ride="carousel" data-interval="5000">

    <ol class="carousel-indicators">
      {% for file in site.data.slider %}
      <li data-target="#carousel"
          data-slide-to="{{ forloop.index0 }}"
          class="{% if forloop.first %}active{% endif %}">
      </li>
      {% endfor %}
    </ol>

    <div class="carousel-inner">
      {% for file in site.data.slider %}
      <div class="item {% if forloop.first %}active{% endif %}">
        <img src="{{ '/images/slider/' | append: file | relative_url }}"
             alt="Slide {{ forloop.index }}">
      </div>
      {% endfor %}
    </div>

    <a class="left carousel-control" href="#carousel" data-slide="prev">
      <span class="glyphicon glyphicon-chevron-left"></span>
    </a>

    <a class="right carousel-control" href="#carousel" data-slide="next">
      <span class="glyphicon glyphicon-chevron-right"></span>
    </a>

  </div>
</div>
